# Meridian Blog Engine - Fly.io Configuration
#
# Deployment steps:
#
# 1. Create the app (from this directory):
#      fly launch
#
# 2. Create and attach a Postgres database:
#      fly postgres create --name meridian-blog-db
#      fly postgres attach meridian-blog-db
#    This automatically sets DATABASE_URL as a secret.
#
# 3. (Optional) Add Redis via Upstash:
#      fly redis create
#    This sets REDIS_URL as a secret.
#
# 4. Set required secrets:
#      fly secrets set APP_SECRET=<random-secret-key> ADMIN_EMAIL=admin@example.com ADMIN_PASSWORD=<strong-password>
#
# 5. Deploy:
#      fly deploy
#
# The release_command below runs database migrations automatically on each deploy.

app = "meridian-blog"
primary_region = "iad"

# Use the existing multi-stage Dockerfile (Deno 2.1.4)
[build]

[deploy]
  # Run database migrations before starting the new release
  release_command = "deno run --allow-net --allow-read --allow-env --allow-write=./uploads db/migrate.ts"

[env]
  APP_ENV = "production"
  APP_PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
