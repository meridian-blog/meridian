<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    >
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/api/public/rss">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              parchment: '#FAF9F6',
              linen: '#F2F0EB',
              ink: '#1A1A1A',
              muted: '#6B6B6B',
              crimson: '#C41E3A',
              forest: '#2D5016',
              gold: '#B8860B',
            },
            fontFamily: {
              serif: ['Crimson Text', 'Georgia', 'serif'],
              sans: ['Inter', '-apple-system', 'sans-serif'],
            },
            borderRadius: {
              brutal: '2px',
            },
          },
        },
      };
    </script>
    <style>
      @media (max-width: 1100px) {
        .layout {
          grid-template-columns: 1fr !important;
        }
        .sidebar-left, .sidebar-right {
          display: none !important;
        }
      }
      .post-tag:not(:last-child)::after {
        content: '\00B7';
        margin-left: 0.5rem;
        color: #6b6b6b;
      }
      .post-footer span:not(:last-child)::after {
        content: '\00B7';
        margin-left: 0.5rem;
      }
    </style>
  </head>
  <body class="font-sans text-base leading-relaxed text-ink bg-parchment antialiased">
    <div
      class="layout grid grid-cols-[280px_minmax(auto,720px)_1fr] gap-16 max-w-[1400px] mx-auto p-10"
    >
      <!-- Left Sidebar -->
      <aside class="sidebar-left sticky top-10 h-fit">
        <a href="/" class="text-inherit no-underline flex items-center gap-2 mb-2">
          <span
            class="inline-flex items-center justify-center w-8 h-8 bg-ink text-parchment font-serif font-semibold text-lg rounded-brutal leading-none"
          >M</span>
          <h1
            id="siteTitle"
            class="font-serif text-4xl font-semibold tracking-tight leading-none"
          >
            Meridian
          </h1>
        </a>
        <p id="siteDesc" class="text-muted text-sm leading-normal mb-16 max-w-[220px]">
          A modern publishing platform with zero platform fees.
        </p>

        <nav class="flex flex-col gap-1">
          <a
            href="/"
            class="py-2 text-muted text-sm no-underline transition-colors duration-150 hover:text-ink"
          >Home</a>
          <a
            href="/login"
            class="py-2 text-muted text-sm no-underline transition-colors duration-150 hover:text-ink"
          >Admin</a>
        </nav>

        <div class="mt-[104px] pt-10 border-t border-black/[0.06]">
          <div class="text-[10px] uppercase tracking-[0.15em] text-muted mb-2">Follow</div>
          <div id="socialLinks" class="flex gap-6">
            <a
              href="/api/public/rss"
              class="text-muted no-underline text-[13px] hover:text-ink transition-colors duration-150"
            >RSS</a>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="min-h-screen" id="content">
        <div class="text-center py-[104px] text-muted">Loading...</div>
      </main>

      <!-- Right Sidebar -->
      <aside class="sidebar-right sticky top-10 h-fit">
        <div class="mb-16">
          <div class="text-[10px] uppercase tracking-[0.15em] text-muted mb-6">All Tags</div>
          <div id="allTags" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="newsletter-widget bg-white border border-black/[0.06] p-8">
          <div class="text-[10px] uppercase tracking-[0.15em] text-muted mb-6">Newsletter</div>
          <p class="text-sm text-muted mb-6 leading-normal">
            Get the latest posts delivered to your inbox.
          </p>
          <form class="flex flex-col gap-2" onsubmit="subscribe(event)">
            <input
              type="email"
              placeholder="your@email.com"
              required
              class="p-3 border border-black/10 rounded-brutal text-sm outline-none focus:border-ink"
            >
            <button
              type="submit"
              class="p-3 bg-ink text-parchment border-none rounded-brutal text-sm font-medium cursor-pointer transition-transform duration-150 hover:-translate-y-px"
            >
              Subscribe
            </button>
          </form>
        </div>
      </aside>
    </div>

    <script src="/toast.js"></script>
    <script>
      var tagSlug = window.location.pathname.replace('/tag/', '');
      var currentPage = 1;
      var permalinkFormat = '/post/:slug';

      function postUrl(slug) {
        return permalinkFormat.replace(':slug', slug);
      }

      async function loadTagPosts(page) {
        currentPage = page || 1;
        try {
          var res = await fetch(
            '/api/public/posts?tag=' + tagSlug + '&page=' + currentPage + '&perPage=10',
          );
          var data = await res.json();

          if (!data.success) {
            document.getElementById('content').innerHTML =
              '<div class="text-center py-[104px] text-muted">Error loading posts</div>';
            return;
          }

          var posts = data.data || [];
          var pagination = data.pagination;

          // Try to find tag name from first post
          var tagName = tagSlug;
          if (posts.length && posts[0].tags) {
            var found = posts[0].tags.find(function (t) {
              return t.slug === tagSlug;
            });
            if (found) tagName = found.name;
          }

          document.title = tagName + ' - Meridian';

          var header = '<div class="mb-16 pb-10 border-b border-black/[0.06]">' +
            '<div class="text-[11px] uppercase tracking-[0.15em] text-muted mb-2">Tag</div>' +
            '<h1 class="font-serif text-[42px] font-normal leading-tight tracking-tight">' +
            tagName + '</h1>' +
            '<p class="text-muted mt-2">' + pagination.total + ' post' +
            (pagination.total !== 1 ? 's' : '') + '</p>' +
            '</div>';

          if (!posts.length) {
            document.getElementById('content').innerHTML = header +
              '<div class="text-center py-16 text-muted">No posts with this tag yet.</div>';
            return;
          }

          var postsHtml = posts.map(function (post, i) {
            return '<article class="mb-[104px] pb-16 ' +
              (i < posts.length - 1 ? 'border-b border-black/[0.06]' : '') + '">' +
              '<div class="flex gap-2 mb-2 text-xs uppercase tracking-wider">' +
              (post.featured
                ? '<span class="bg-crimson text-white px-2 py-0.5 text-[10px] uppercase tracking-wider mr-2">Featured</span>'
                : '') +
              (post.tags || []).slice(0, 2).map(function (t) {
                return '<span class="post-tag text-muted">' + t.name + '</span>';
              }).join('') +
              '</div>' +
              '<h2 class="font-serif text-[32px] font-normal leading-tight mb-2 tracking-tight">' +
              '<a href="' + postUrl(post.slug) +
              '" class="text-inherit no-underline hover:text-muted transition-colors duration-150">' +
              post.title + '</a>' +
              '</h2>' +
              '<p class="text-muted text-base leading-relaxed mb-6 max-w-prose">' +
              (post.excerpt || '') + '</p>' +
              '<div class="post-footer flex gap-2 text-[13px] text-muted">' +
              '<span>' + post.authorName + '</span>' +
              '<span>' +
              new Date(post.publishedAt).toLocaleDateString('en-US', {
                month: 'long',
                day: 'numeric',
                year: 'numeric',
              }) + '</span>' +
              '<span>' + post.readingTime + ' min read</span>' +
              '</div>' +
              '</article>';
          }).join('');

          // Pagination
          var paginationHtml = '';
          if (pagination.hasPrev || pagination.hasNext) {
            paginationHtml =
              '<div class="flex justify-between items-center py-10 border-t border-black/[0.06]">' +
              (pagination.hasPrev
                ? '<button onclick="loadTagPosts(' + (currentPage - 1) +
                  ')" class="border border-black/15 text-muted px-6 py-3 text-sm font-medium rounded-brutal transition-all duration-150 hover:border-ink hover:text-ink cursor-pointer bg-transparent">Newer Posts</button>'
                : '<span></span>') +
              '<span class="text-sm text-muted">Page ' + pagination.page + ' of ' +
              pagination.totalPages + '</span>' +
              (pagination.hasNext
                ? '<button onclick="loadTagPosts(' + (currentPage + 1) +
                  ')" class="border border-black/15 text-muted px-6 py-3 text-sm font-medium rounded-brutal transition-all duration-150 hover:border-ink hover:text-ink cursor-pointer bg-transparent">Older Posts</button>'
                : '<span></span>') +
              '</div>';
          }

          document.getElementById('content').innerHTML = header + postsHtml +
            paginationHtml;
        } catch (err) {
          document.getElementById('content').innerHTML =
            '<div class="text-center py-[104px] text-muted">Error loading posts</div>';
        }
      }

      // Load all tags for sidebar
      async function loadTags() {
        try {
          var res = await fetch('/api/public/tags');
          var data = await res.json();
          if (data.success && data.data) {
            document.getElementById('allTags').innerHTML = data.data.map(function (t) {
              var isActive = t.slug === tagSlug;
              return '<a href="/tag/' + t.slug +
                '" class="inline-block py-1 px-3 text-[13px] rounded-brutal no-underline transition-all duration-150 ' +
                (isActive
                  ? 'bg-ink text-parchment'
                  : 'border border-black/10 text-muted hover:border-ink hover:text-ink') +
                '">' + t.name + (t.postCount ? ' (' + t.postCount + ')' : '') + '</a>';
            }).join('');
          }
        } catch (err) { /* ignore */ }
      }

      async function subscribe(e) {
        e.preventDefault();
        var email = e.target.querySelector('input').value;
        try {
          var res = await fetch('/api/public/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email }),
          });
          var data = await res.json();
          toast.success(
            data.data?.alreadySubscribed
              ? 'Already subscribed!'
              : 'Thanks for subscribing!',
          );
          e.target.reset();
        } catch (err) {
          toast.error('Error. Please try again.');
        }
      }

      async function loadSiteSettings() {
        try {
          var res = await fetch('/api/public/site');
          var data = await res.json();
          if (data.success && data.data) {
            var s = data.data;
            if (s.permalinkFormat) permalinkFormat = s.permalinkFormat;
            var titleEl = document.getElementById('siteTitle');
            var descEl = document.getElementById('siteDesc');
            if (titleEl) titleEl.textContent = s.title;
            if (descEl) descEl.textContent = s.description;

            var links = s.socialLinks || {};
            var linksHtml = '';
            var labels = {
              twitter: 'Twitter',
              github: 'GitHub',
              linkedin: 'LinkedIn',
              youtube: 'YouTube',
            };
            for (var key in labels) {
              if (links[key]) {
                linksHtml += '<a href="' + links[key] +
                  '" target="_blank" rel="noopener" class="text-muted no-underline text-[13px] hover:text-ink transition-colors duration-150">' +
                  labels[key] + '</a>';
              }
            }
            linksHtml +=
              '<a href="/api/public/rss" class="text-muted no-underline text-[13px] hover:text-ink transition-colors duration-150">RSS</a>';
            var socialEl = document.getElementById('socialLinks');
            if (socialEl) socialEl.innerHTML = linksHtml;
          }
        } catch (e) {}
      }

      loadSiteSettings().then(function () {
        loadTagPosts(1);
        loadTags();
      });
    </script>
  </body>
</html>
